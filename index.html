<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title></title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Mitr:wght@200;300;400;500;600&display=swap" rel="stylesheet">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Mitr', 'sans-serif'] },
          colors: {
            primary: '#6200ea',
            'primary-light': '#d1c4e9',
            success: '#34A853',
            magenta: '#ff00ff'
          }
        }
      }
    }
  </script>
  
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  
  <style>
    * { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
    
    /* เทคนิคทำให้ตัวอักษรดูสูงขึ้น (Vertical Stretching) */
    .stretched-font {
      transform: scaleY(1.1); /* ยืดตัวอักษรขึ้น 10% */
      transform-origin: bottom;
      display: inline-block;
      width: 100%;
    }

    .material-input {
      border-bottom: 1px solid #e0e0e0;
      padding: 16px 0 4px 0; /* Padding กระชับเท่าเดิม */
      width: 100%;
      font-size: 16px;
      font-weight: 200; /* บาง */
      outline: none;
      background: transparent;
      border-radius: 0;
      /* ยืดตัวอักษรข้างใน input */
      transform: scaleY(1.15); 
      transform-origin: left bottom;
    }
    
    .material-input:focus { border-bottom-color: #6200ea; }
    
    .material-label {
      position: absolute;
      top: 16px;
      left: 0;
      font-size: 15px;
      font-weight: 200;
      color: #9ca3af;
      pointer-events: none;
      transform: scaleY(1.1);
      transform-origin: left bottom;
    }

    .material-input:focus + .material-label,
    .material-input:not(:placeholder-shown) + .material-label {
      top: 0;
      font-size: 11px;
      color: #6200ea;
      font-weight: 400;
      transform: scaleY(1); /* เวลาย่อ label ไม่ต้องยืด */
    }

    .loader-container {
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      height: 100vh; background-color: #ffffff;
    }
    .spinner {
      width: 30px; height: 30px; border: 2px solid #f3f4f6;
      border-top: 2px solid #7c3aed; border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body class="bg-white text-gray-900 font-sans antialiased font-[200]">

  <div id="app" class="min-h-screen">
    
    <div v-if="!isLoaded" class="loader-container">
      <div class="spinner"></div>
      <div class="mt-4 text-gray-400 text-[10px] tracking-[0.3em] uppercase">Processing</div>
    </div>

    <div v-show="isLoaded">
      <header class="bg-white text-gray-800 border-b border-gray-50 sticky top-0 z-50">
        <div class="max-w-4xl mx-auto px-5 py-4 flex items-center justify-between">
          <h1 class="text-lg font-[300] tracking-tight transform scale-y-110 origin-left">🙏 บันทึกรายชื่อร่วมบุญ</h1>
          <span class="text-[9px] text-gray-300 tracking-[0.2em]">V.2.0</span>
        </div>
      </header>

      <main class="p-3 max-w-4xl mx-auto pb-44">
        <form @submit.prevent="submitForm" class="space-y-1">
          
          <div v-for="(person, index) in donors" :key="index" 
               class="bg-white py-1 relative">
            
            <button v-if="donors.length > 1" @click="removePerson(index)" type="button"
              class="absolute top-1/2 -translate-y-1/2 right-0 text-gray-300 p-2">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M6 18L18 6M6 6l12 12" />
              </svg>
            </button>

            <div class="grid grid-cols-[30px_1fr_75px] gap-3 items-end pr-7">
              
              <div class="flex justify-start pb-2">
                <span class="text-primary-light font-[500] text-[10px] tracking-tighter">
                  {{ (index + 1).toString().padStart(2, '0') }}
                </span>
              </div>

              <div class="relative">
                <input :id="'n-'+index" v-model="person.name" type="text" placeholder=" " required
                  @focus="handleFocus"
                  class="material-input">
                <label :for="'n-'+index" class="material-label">ชื่อ-นามสกุล</label>
              </div>

              <div class="relative">
                <input :id="'a-'+index" v-model.number="person.amount" type="number" placeholder=" " required
                  @focus="handleFocus"
                  class="material-input text-right pr-1">
                <label :for="'a-'+index" class="material-label w-full text-right">ยอดเงิน</label>
              </div>
            </div>
          </div>

          <button @click="addPerson" type="button"
            class="w-full py-3 border border-dashed border-magenta/20 rounded-lg text-magenta font-[300] text-xs flex items-center justify-center active:scale-95 transition mt-4 uppercase tracking-widest">
            + Add Person
          </button>

        </form>
      </main>

      <div class="fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-md border-t border-gray-100 p-5 pb-8 z-40">
        <div class="max-w-4xl mx-auto flex items-center justify-between">
          <div>
            <p class="text-[9px] text-gray-400 font-[500] uppercase tracking-widest mb-0.5">Summary</p>
            <p class="text-3xl font-[200] text-magenta tracking-tighter transform scale-y-110 origin-left">
              {{ totalAmount.toLocaleString() }} 
              <span class="text-[10px] font-[300] text-gray-400 ml-1 uppercase">Baht</span>
            </p>
          </div>
          <button @click="submitForm"
            class="bg-success text-white px-10 py-3 rounded-full text-xs font-[400] tracking-widest uppercase active:scale-95 shadow-lg shadow-success/10">
            Submit
          </button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const { createApp, ref, computed, onMounted } = Vue
    createApp({
      setup() {
        const isLoaded = ref(false)
        const donors = ref([{ name: '', amount: null }])

        onMounted(() => {
          setTimeout(() => { isLoaded.value = true }, 500)
        })

        const totalAmount = computed(() => {
          return donors.value.reduce((sum, p) => sum + (Number(p.amount) || 0), 0)
        })

        const addPerson = () => {
          donors.value.push({ name: '', amount: null })
        }

        const removePerson = (index) => {
          if (donors.value.length > 1) donors.value.splice(index, 1)
        }

        const handleFocus = (event) => {
          setTimeout(() => {
            event.target.scrollIntoView({ behavior: 'smooth', block: 'center' })
          }, 350)
        }

        const submitForm = () => {
          alert(`ขอบคุณครับ! ยอดรวมคือ ${totalAmount.value} บาท`)
        }

        return { isLoaded, donors, totalAmount, addPerson, removePerson, submitForm, handleFocus }
      }
    }).mount('#app')
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>แบบฟอร์มออกใบอนุโมทนาบัตร</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="p-3">

<div class="container">
  <h4 class="mb-3">กรอกข้อมูลทำบุญ</h4>

  <input id="name" class="form-control mb-2" placeholder="ชื่อ-สกุล">
  <input id="amount" type="number" class="form-control mb-3" placeholder="ยอดเงิน">

  <button class="btn btn-primary w-100" onclick="submitForm()">บันทึก</button>
</div>

<script>
async function submitForm() {
  await liff.init({ liffId: "2009694352-LHMu0lor" });

  if (!liff.isLoggedIn()) {
    liff.login();
    return;
  }

  const profile = await liff.getProfile();

  const name = document.getElementById("name").value;
  const amount = document.getElementById("amount").value;

  const res = await fetch("https://linebot-donate.onrender.com/save", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      userId: profile.userId,
      name: name,
      amount: amount
    })
  });

  const data = await res.json();

  // ส่งกลับไปแชท
  await liff.sendMessages([
    {
      type: "text",
      text: "เลขรายการ: " + data.donateId + "\nกรุณาส่งสลิปค่ะ"
    }
  ]);

  liff.closeWindow();
}
</script>

</body>
</html>

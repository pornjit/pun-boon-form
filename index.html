<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title></title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Roboto', 'sans-serif'] },
          colors: {
            primary: '#6200ea',
            'primary-dark': '#3700b3',
            secondary: '#03dac6',
            success: '#34A853'
          }
        }
      }
    }
  </script>
  
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  
  <style>
    * { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
    .material-input {
      border-bottom: 2px solid #e0e0e0;
      padding: 18px 0 4px 0;
      width: 100%;
      font-size: 15px;
      outline: none;
      background: transparent;
    }
    .material-input:focus { border-bottom-color: #6200ea; }
    .material-label {
      position: absolute;
      top: 18px;
      left: 0;
      font-size: 15px;
      color: #757575;
      pointer-events: none;
    }
    .material-input:focus + .material-label,
    .material-input:not(:placeholder-shown) + .material-label {
      top: 0;
      font-size: 11px;
      color: #6200ea;
      font-weight: 600;
    }
    .loader-container {
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      height: 100vh; background-color: #f3f4f6;
    }
    .spinner {
      width: 40px; height: 40px; border: 4px solid #e5e7eb;
      border-top: 4px solid #7c3aed; border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body class="bg-gray-50 text-gray-900 font-sans antialiased">

  <div id="app" class="min-h-screen">
    <div v-if="!isLoaded" class="loader-container">
      <div class="spinner"></div>
      <div class="loading-text mt-4 text-gray-500">กำลังเข้าสู่หน้างานบุญ...</div>
    </div>

    <div v-show="isLoaded">
      <header class="bg-primary text-white shadow-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
          <div class="flex items-center">
            <h1 class="text-xl font-bold">🙏 บันทึกสายบุญ</h1>
          </div>
          <div class="text-xs bg-primary-dark px-3 py-1 rounded-full text-primary-light">V.2026</div>
        </div>
      </header>

      <main class="p-3 md:p-8 max-w-4xl mx-auto pb-40">
        <form @submit.prevent="submitForm" class="space-y-3">
          
          <div v-for="(person, index) in donors" :key="index" 
               class="bg-white rounded-xl p-3 pr-10 shadow-sm border border-gray-100 relative group">
            
            <button v-if="donors.length > 1" @click="removePerson(index)" type="button"
              class="absolute top-1/2 -translate-y-1/2 right-2 text-gray-300 hover:text-red-400">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd" />
              </svg>
            </button>

            <div class="grid grid-cols-[35px_1fr_90px] gap-3 items-end">
              
              <div class="pb-1 text-center">
                <span class="text-primary font-bold text-lg">{{ index + 1 }}.</span>
              </div>

              <div class="relative">
                <input :id="'n-'+index" v-model="person.name" type="text" placeholder=" " required
                  @focus="handleFocus"
                  class="material-input">
                <label :for="'n-'+index" class="material-label">ชื่อ-นามสกุล</label>
              </div>

              <div class="relative">
                <input :id="'a-'+index" v-model.number="person.amount" type="number" placeholder=" " required
                  @focus="handleFocus"
                  class="material-input font-bold text-right pr-1">
                <label :for="'a-'+index" class="material-label w-full text-right">ยอดเงิน</label>
                <span class="absolute right-0 bottom-1 text-[10px] text-gray-400">฿</span>
              </div>
            </div>
          </div>

          <div class="py-2">
            <button @click="addPerson" type="button"
              class="w-full py-3 border-2 border-dashed border-primary/30 rounded-xl text-primary font-medium flex items-center justify-center hover:bg-primary/5 active:bg-primary/10 transition">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-1" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd" />
              </svg>
              เพิ่มรายชื่อ
            </button>
          </div>

        </form>
      </main>

      <div class="fixed bottom-0 left-0 right-0 bg-white border-t p-4 shadow-[0_-5px_15px_rgba(0,0,0,0.05)] z-40">
        <div class="max-w-4xl mx-auto flex items-center justify-between gap-4">
          <div>
            <p class="text-[10px] text-gray-500 uppercase font-bold tracking-wider">รวมทั้งสิ้น</p>
            <p class="text-xl font-black text-primary">{{ totalAmount.toLocaleString() }} <span class="text-sm font-normal">บาท</span></p>
          </div>
          <button @click="submitForm"
            class="bg-success text-white px-8 py-3 rounded-xl font-bold shadow-lg shadow-success/30 active:scale-95 transition-all">
            ยืนยันยอดบุญ
          </button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const { createApp, ref, computed, onMounted } = Vue
    createApp({
      setup() {
        const isLoaded = ref(false)
        const donors = ref([{ name: '', amount: null }])
        const submittedData = ref(null)

        onMounted(() => {
          setTimeout(() => { isLoaded.value = true }, 800)
        })

        const totalAmount = computed(() => {
          return donors.value.reduce((sum, p) => sum + (Number(p.amount) || 0), 0)
        })

        const addPerson = () => {
          donors.value.push({ name: '', amount: null })
        }

        const removePerson = (index) => {
          if (donors.value.length > 1) donors.value.splice(index, 1)
        }

        // ฟังก์ชันจัดการแป้นพิมพ์บัง
        const handleFocus = (event) => {
          setTimeout(() => {
            event.target.scrollIntoView({ behavior: 'smooth', block: 'center' })
          }, 300) // หน่วงเวลาให้แป้นพิมพ์มือถือเด้งขึ้นมาก่อน
        }

        const submitForm = () => {
          submittedData.value = donors.value
          alert(`สาธุ! ยืนยันยอด ${totalAmount.value} บาท เรียบร้อยแล้ว`)
        }

        return { isLoaded, donors, totalAmount, submittedData, addPerson, removePerson, submitForm, handleFocus }
      }
    }).mount('#app')
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>LIFF Get User</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- LIFF SDK -->
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>

<body>
  <h2>กำลังโหลด...</h2>

  <script>
    async function main() {
      try {
        // 1. init LIFF
        await liff.init({ liffId: "YOUR_LIFF_ID" });

        // 2. ถ้ายังไม่ได้ login → login
        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }

        // 3. ดึงข้อมูล user
        const profile = await liff.getProfile();

        const userId = profile.userId;
        const name = profile.displayName;

        // 4. แสดงผล
        alert(
          "✅ ดึงข้อมูลสำเร็จ\n\n" +
          "userId: " + userId + "\n" +
          "name: " + name
        );

        // (optional) แสดงบนหน้าเว็บด้วย
        document.body.innerHTML = `
          <h2>สำเร็จ 🎉</h2>
          <p><b>userId:</b> ${userId}</p>
          <p><b>name:</b> ${name}</p>
        `;

      } catch (err) {
        alert("❌ ERROR: " + err.message);
        console.error(err);
      }
    }

    main();
  </script>
</body>
</html>
